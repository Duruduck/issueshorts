name: 🔥 이슈 자동 수집

on:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = KST 07:00
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

permissions:
  contents: write           # topics.json 푸시 권한

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 이슈 수집
        env:
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/collect.py

      - name: topics.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/topics.json
          git diff --staged --quiet || git commit -m "chore: topics.json 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
